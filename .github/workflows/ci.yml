name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e .
      - name: Run tests
        run: python -m unittest discover
      - name: Run sample review
        run: codesentinel review examples/sample_repo --format json
      - name: Run evals
        run: codesentinel eval evals/cases.jsonl
